<div class="card">
  <div class="card-header">
    <i class="ti ti-clock" aria-hidden="true"></i>
    Today's status
  </div>
  <div class="row-item">
    <i class="ti ti-activity" aria-hidden="true"></i>
    <span class="row-label">Current status</span>
    <span class="badge" id="status-badge">—</span>
  </div>
  <div class="row-item">
    <i class="ti ti-sun" aria-hidden="true"></i>
    <span class="row-label">ET₀ today</span>
    <span id="status-et0" style="font-size:13px;">—</span>
  </div>
  <div class="row-item">
    <i class="ti ti-cloud-rain" aria-hidden="true"></i>
    <span class="row-label">Yesterday's rainfall</span>
    <span id="status-rain" style="font-size:13px;">—</span>
  </div>
  <div class="row-item">
    <i class="ti ti-umbrella" aria-hidden="true"></i>
    <span class="row-label">Rain forecast today</span>
    <span class="badge badge-info" id="status-forecast">—</span>
  </div>
</div>
