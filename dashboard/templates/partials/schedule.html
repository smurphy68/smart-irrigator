<div class="card">
  <div class="card-header">
    <i class="ti ti-calendar" aria-hidden="true"></i>
    Today's schedule
  </div>
  <div class="card-body">
    <div class="timeline">
      <div class="tl-time">06:00</div>
      <div class="tl-content active">
        <div class="tl-dot fetch"></div>
        <p class="tl-title">Fetch weather &amp; calculate</p>
        <p class="tl-sub" id="sched-fetch">—</p>
      </div>
      <div class="tl-time">06:00–11:00</div>
      <div class="tl-content active">
        <div class="tl-dot active"></div>
        <p class="tl-title">Morning dispensing</p>
        <p class="tl-sub" id="sched-morning">—</p>
      </div>
      <div class="tl-time">11:00–14:00</div>
      <div class="tl-content pause">
        <div class="tl-dot pause"></div>
        <p class="tl-title">Paused — peak evaporation</p>
        <p class="tl-sub">Midday sun reduces absorption</p>
      </div>
      <div class="tl-time">14:00–18:00</div>
      <div class="tl-content active">
        <div class="tl-dot active"></div>
        <p class="tl-title">Afternoon dispensing</p>
        <p class="tl-sub" id="sched-afternoon">—</p>
      </div>
      <div class="tl-time">18:00</div>
      <div class="tl-content done">
        <div class="tl-dot done"></div>
        <p class="tl-title" style="color: var(--text-secondary);">Done for the day</p>
      </div>
    </div>
  </div>
</div>
