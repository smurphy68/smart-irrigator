<div>
  <p class="section-label">Today's overview</p>
  <div class="metric-grid">
    <div class="metric">
      <p class="metric-label">Dispensing today</p>
      <p class="metric-value"><span id="m-daily">—</span> <span class="metric-unit">L</span></p>
    </div>
    <div class="metric">
      <p class="metric-label">Dispensed so far</p>
      <p class="metric-value"><span id="m-dispensed">—</span> <span class="metric-unit">L</span></p>
    </div>
    <div class="metric">
      <p class="metric-label">Remaining</p>
      <p class="metric-value"><span id="m-remaining">—</span> <span class="metric-unit">L</span></p>
    </div>
    <div class="metric">
      <p class="metric-label">ET₀ today</p>
      <p class="metric-value"><span id="m-et0">—</span> <span class="metric-unit">mm</span></p>
    </div>
    <div class="metric">
      <p class="metric-label">Yesterday's rain</p>
      <p class="metric-value"><span id="m-rain">—</span> <span class="metric-unit">mm</span></p>
    </div>
    <div class="metric">
      <p class="metric-label">Rain forecast</p>
      <p class="metric-value"><span id="m-forecast">—</span> <span class="metric-unit">%</span></p>
    </div>
  </div>
</div>
